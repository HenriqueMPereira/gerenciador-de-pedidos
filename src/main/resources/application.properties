spring.application.name=gerenciador-pedidos

# ConexŃo com o Banco
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME_1}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurań§es do Hibernate/JPA
# 'update' cria as tabelas automaticamente se elas nŃo existirem
spring.jpa.hibernate.ddl-auto=update
hibernate.dialect=org.hibernate.dialect.HSQLDialect

# Exibe as queries SQL no console (·til para aprender e debugar)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Silencia os logs de inicializańŃo do Spring e Hibernate
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN